{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-icon"><i class="bi bi-person-plus"></i></div>
        <h3>创建账户</h3>
        <p class="auth-sub">加入 {{ site_name }} 开始管理你的内容</p>
        <form method="POST" autocomplete="on" id="regForm">
            <div class="mb-3">
                <label for="username" class="form-label">用户名 <span class="text-muted">(2-80 字符)</span></label>
                <div class="input-icon">
                    <input type="text" class="form-control" id="username" name="username" required autofocus minlength="2" maxlength="80" autocomplete="username" placeholder="给自己取个名字">
                    <i class="bi bi-person"></i>
                </div>
            </div>
            <div class="mb-2">
                <label for="password" class="form-label">密码 <span class="text-muted">(至少 4 位)</span></label>
                <div class="input-icon">
                    <input type="password" class="form-control" id="password" name="password" required minlength="4" autocomplete="new-password" placeholder="设置一个密码" style="padding-right:2.6rem;">
                    <i class="bi bi-lock"></i>
                    <button type="button" class="input-pwd-toggle" onclick="togglePwd('password', this)" tabindex="-1" aria-label="显示密码">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="pwd-meter"><div id="pwdBar"></div></div>
                <div class="pwd-strength-text" id="pwdText">密码强度</div>
            </div>
            <div class="mb-4">
                <label for="password_confirm" class="form-label">确认密码</label>
                <div class="input-icon">
                    <input type="password" class="form-control" id="password_confirm" name="password_confirm" required minlength="4" autocomplete="new-password" placeholder="再次输入密码" style="padding-right:2.6rem;">
                    <i class="bi bi-lock-fill"></i>
                    <button type="button" class="input-pwd-toggle" onclick="togglePwd('password_confirm', this)" tabindex="-1" aria-label="显示密码">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="form-text" id="pwdMatch"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg"><i class="bi bi-check-circle"></i> 注册</button>
        </form>
        <div class="auth-foot">
            已有账号？<a href="{{ url_for('login') }}">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePwd(id, btn) {
    var el = document.getElementById(id);
    var icon = btn.querySelector('i');
    if (el.type === 'password') { el.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { el.type = 'password'; icon.className = 'bi bi-eye'; }
}
(function(){
    var pwd = document.getElementById('password');
    var pc  = document.getElementById('password_confirm');
    var bar = document.getElementById('pwdBar');
    var txt = document.getElementById('pwdText');
    var match = document.getElementById('pwdMatch');

    function score(v) {
        var s = 0;
        if (!v) return 0;
        if (v.length >= 4) s++;
        if (v.length >= 8) s++;
        if (/[a-z]/.test(v) && /[A-Z]/.test(v)) s++;
        if (/\d/.test(v)) s++;
        if (/[^A-Za-z0-9]/.test(v)) s++;
        return Math.min(s, 4);
    }
    var labels = ['', '弱', '一般', '良好', '强'];
    var colors = ['#54547c', '#ff4060', '#ffb020', '#00d4ff', '#00dc6c'];

    function update() {
        var sc = score(pwd.value);
        var pct = sc === 0 ? 0 : (sc / 4) * 100;
        bar.style.width = pct + '%';
        bar.style.background = colors[sc];
        txt.textContent = sc === 0 ? '密码强度' : '强度：' + labels[sc];
        txt.style.color = sc >= 3 ? colors[sc] : '';
    }
    function checkMatch() {
        if (!pc.value) { match.textContent = ''; return; }
        if (pwd.value === pc.value) {
            match.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> 密码一致';
            match.style.color = 'var(--green)';
        } else {
            match.innerHTML = '<i class="bi bi-x-circle-fill"></i> 两次密码不一致';
            match.style.color = 'var(--red)';
        }
    }
    pwd.addEventListener('input', function(){ update(); checkMatch(); });
    pc.addEventListener('input', checkMatch);
})();
</script>
{% endblock %}
